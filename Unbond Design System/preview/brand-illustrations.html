<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><title>Illustration Motifs</title>
<style>
body{margin:0;padding:18px;background:#F4EDE4;font-family:'Montserrat',sans-serif;width:700px;box-sizing:border-box;color:#4A4E52}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.cell{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 4px 15px rgba(0,0,0,0.05);display:flex;flex-direction:column}
.cell img{width:100%;height:110px;object-fit:cover;display:block}
.cell .n{padding:8px 10px;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:#7A9E8A;font-weight:700}
.cell .n span{display:block;color:#6C7075;font-weight:400;letter-spacing:0;text-transform:none;margin-top:2px}
</style></head><body>
<div class="grid">
  <div class="cell"><img src="../assets/illustration-kintsugi.jpg" alt=""><div class="n">Kintsugi<span>Healing scars</span></div></div>
  <div class="cell"><img src="../assets/illustration-butterfly.jpg" alt=""><div class="n">Butterfly<span>Transformation</span></div></div>
  <div class="cell"><img src="../assets/illustration-spielautomat.png" alt=""><div class="n">Slot machine<span>Intermit. reinforcement</span></div></div>
  <div class="cell"><img src="../assets/illustration-polyvagal.png" alt=""><div class="n">Polyvagal<span>Nervous system</span></div></div>
  <div class="cell"><img src="../assets/illustration-bindung.png" alt=""><div class="n">Bindung<span>Attachment theory</span></div></div>
  <div class="cell"><img src="../assets/illustration-growth.png" alt=""><div class="n">Growth<span>Module 10 closer</span></div></div>
  <div class="cell"><img src="../assets/illustration-traumabonding.png" alt=""><div class="n">Trauma bond<span>Module 2 hero</span></div></div>
  <div class="cell"><img src="../assets/illustration-gaslighting.png" alt=""><div class="n">Gaslighting<span>Landing flip card</span></div></div>
</div>
</body></html>
