<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><title>Radii & Shadows</title>
<style>
body{margin:0;padding:24px;background:#F4EDE4;font-family:'Montserrat',sans-serif;width:700px;box-sizing:border-box;color:#4A4E52}
.row{display:flex;gap:16px;margin-bottom:16px}
.b{flex:1;background:#fff;padding:16px;text-align:center;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:#7A9E8A;font-weight:700}
.b span{display:block;color:#6C7075;font-weight:400;letter-spacing:0;text-transform:none;margin-top:4px;font-size:10px}
.lbl{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#7A9E8A;margin:4px 0 8px;font-weight:700}
</style></head><body>
<div class="lbl">Radii</div>
<div class="row">
  <div class="b" style="border-radius:4px">4 · tag</div>
  <div class="b" style="border-radius:8px">8 · button</div>
  <div class="b" style="border-radius:12px">12 · card</div>
  <div class="b" style="border-radius:16px">16 · exercise</div>
  <div class="b" style="border-radius:20px">20 · story</div>
  <div class="b" style="border-radius:999px">Pill · badge</div>
</div>
<div class="lbl">Shadows</div>
<div class="row">
  <div class="b" style="border-radius:12px;box-shadow:0 4px 15px rgba(0,0,0,0.05)">sm<span>cream lift</span></div>
  <div class="b" style="border-radius:12px;box-shadow:0 8px 30px rgba(0,0,0,0.12)">md<span>mid cards</span></div>
  <div class="b" style="border-radius:12px;box-shadow:0 10px 50px rgba(0,0,0,0.25)">xl<span>hero glass</span></div>
  <div class="b" style="border-radius:12px;box-shadow:0 8px 25px rgba(122,158,138,0.4)">brand<span>CTA hover</span></div>
</div>
</body></html>
