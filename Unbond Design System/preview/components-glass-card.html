<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><title>Glass Card</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&family=Poppins:wght@300;600&display=swap" rel="stylesheet">
<style>
body{margin:0;padding:24px;background:#1a2420 url('../assets/hero-bg.png') center/cover fixed;font-family:'Poppins',sans-serif;width:700px;box-sizing:border-box;color:#F4EDE4}
.wrap{position:relative}
.wrap::before{content:'';position:absolute;inset:-24px;background:linear-gradient(160deg,rgba(10,22,15,0.5),rgba(8,18,12,0.5));z-index:0}
.card{position:relative;z-index:1;background:rgba(15,20,45,0.22);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border:1px solid rgba(122,158,200,0.22);border-radius:14px;padding:24px;box-shadow:0 8px 40px rgba(0,0,0,0.35)}
.badge{display:inline-block;background:rgba(122,158,138,0.3);border:1px solid rgba(122,158,138,0.5);color:#C6F7A6;padding:5px 14px;border-radius:10px;font-family:'Montserrat';font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:12px}
h3{font-family:'Poppins';font-weight:600;font-size:20px;margin:0 0 8px;color:#F4EDE4}
p{font-weight:300;font-size:13px;line-height:1.6;color:rgba(244,237,228,0.85);margin:0}
</style></head><body>
<div class="wrap"><div class="card">
  <div class="badge">Speziell für WLW</div>
  <h3>Erkenne das Muster. Verstehe die Dynamik.</h3>
  <p>15 Fragen, 2 Minuten, 1 psychologisches Profil deiner Ex-Partnerin. Wissenschaftlich fundiert, 100% anonym.</p>
</div></div>
</body></html>
