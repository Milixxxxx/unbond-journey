<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><title>Primary Colors</title>
<style>
body{margin:0;padding:24px;background:#F4EDE4;font-family:ui-sans-serif,system-ui;width:700px;box-sizing:border-box}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.sw{border-radius:12px;overflow:hidden;box-shadow:0 4px 15px rgba(0,0,0,0.06);height:140px;display:flex;flex-direction:column;justify-content:flex-end;padding:14px;color:#fff;font-family:'Montserrat',sans-serif}
.sw .name{font-weight:700;font-size:14px;letter-spacing:1.5px;text-transform:uppercase}
.sw .hex{font-family:ui-monospace,Menlo;font-size:12px;opacity:0.85;margin-top:2px}
.sw .mean{font-size:11px;opacity:0.75;margin-top:6px;letter-spacing:0.5px}
</style></head><body>
<div class="grid">
  <div class="sw" style="background:#7A9E8A"><div class="name">Sage Green</div><div class="hex">#7A9E8A</div><div class="mean">Ruhe · grounding</div></div>
  <div class="sw" style="background:#9B7FA4"><div class="name">Mauve</div><div class="hex">#9B7FA4</div><div class="mean">Sanfte Stärke</div></div>
  <div class="sw" style="background:#F4EDE4;color:#4A4E52"><div class="name">Cream</div><div class="hex">#F4EDE4</div><div class="mean">Klarheit · surface</div></div>
  <div class="sw" style="background:#6B3E44"><div class="name">Bordeaux</div><div class="hex">#6B3E44</div><div class="mean">Tiefe · CTAs</div></div>
  <div class="sw" style="background:#C4836E"><div class="name">Terracotta</div><div class="hex">#C4836E</div><div class="mean">Wärme · progress</div></div>
  <div class="sw" style="background:#4A4E52"><div class="name">Graphite</div><div class="hex">#4A4E52</div><div class="mean">Body text</div></div>
</div>
</body></html>
