<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><title>Spacing</title>
<style>
body{margin:0;padding:24px;background:#F4EDE4;font-family:'Montserrat',sans-serif;width:700px;box-sizing:border-box;color:#4A4E52}
.row{display:flex;align-items:center;gap:16px;margin-bottom:8px}
.num{width:64px;font-weight:700;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:#7A9E8A}
.bar{background:#9B7FA4;height:16px;border-radius:3px}
.v{font-size:11px;color:#6C7075;font-family:ui-monospace,Menlo}
</style></head><body>
<div class="row"><div class="num">s-1</div><div class="bar" style="width:4px"></div><div class="v">4px</div></div>
<div class="row"><div class="num">s-2</div><div class="bar" style="width:8px"></div><div class="v">8px</div></div>
<div class="row"><div class="num">s-3</div><div class="bar" style="width:12px"></div><div class="v">12px</div></div>
<div class="row"><div class="num">s-4</div><div class="bar" style="width:16px"></div><div class="v">16px</div></div>
<div class="row"><div class="num">s-6</div><div class="bar" style="width:24px"></div><div class="v">24px</div></div>
<div class="row"><div class="num">s-8</div><div class="bar" style="width:32px"></div><div class="v">32px</div></div>
<div class="row"><div class="num">s-12</div><div class="bar" style="width:48px"></div><div class="v">48px · section inner</div></div>
<div class="row"><div class="num">s-20</div><div class="bar" style="width:80px"></div><div class="v">80px · section outer</div></div>
</body></html>
