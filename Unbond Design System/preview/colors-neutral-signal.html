<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><title>Neutral & Signal</title>
<style>
body{margin:0;padding:24px;background:#F4EDE4;font-family:ui-sans-serif;width:700px;box-sizing:border-box}
.row{display:flex;gap:10px;margin-bottom:12px}
.sw{flex:1;border-radius:10px;height:80px;padding:10px;display:flex;flex-direction:column;justify-content:flex-end;font-family:'Montserrat',sans-serif;font-size:11px;letter-spacing:1px;text-transform:uppercase}
.sw .hex{font-family:ui-monospace,Menlo;font-size:10px;opacity:0.75;margin-top:2px;letter-spacing:0}
.section-label{font-family:'Montserrat';font-weight:700;font-size:10px;letter-spacing:2px;color:#7A9E8A;text-transform:uppercase;margin:4px 0 10px}
</style></head><body>
<div class="section-label">Neutrals</div>
<div class="row">
  <div class="sw" style="background:#F4EDE4;color:#4A4E52;border:1px solid #E8DED4"><div>Cream</div><div class="hex">#F4EDE4</div></div>
  <div class="sw" style="background:#E8DED4;color:#4A4E52"><div>Sandstone</div><div class="hex">#E8DED4</div></div>
  <div class="sw" style="background:#D3CDC7;color:#4A4E52"><div>Stone</div><div class="hex">#D3CDC7</div></div>
  <div class="sw" style="background:#2D4F3C;color:#F4EDE4"><div>Dark Green</div><div class="hex">#2D4F3C</div></div>
  <div class="sw" style="background:#1a2420;color:#F4EDE4"><div>BG Dark</div><div class="hex">#1a2420</div></div>
</div>
<div class="section-label">Signal</div>
<div class="row">
  <div class="sw" style="background:#C74B4B;color:#fff"><div>SOS Red</div><div class="hex">#C74B4B</div></div>
  <div class="sw" style="background:#5A8A6F;color:#fff"><div>Success</div><div class="hex">#5A8A6F</div></div>
  <div class="sw" style="background:#D4A574;color:#4A4E52"><div>Warning</div><div class="hex">#D4A574</div></div>
</div>
</body></html>
